server:
  port: 8890
  mode: debug

database:
  dsn: "postgres://postgres:postgres@127.0.0.1:5432/solana_scalper_v2?sslmode=disable"
  auto_migrate: true

datasource:
  kline_source: "gmgn" # gmgn / birdeye / sql / db；默认所有 K 线入口走 GMGN
  kline_query: ""
  token_search_query: ""

birdeye:
  base_url: "https://public-api.birdeye.so"
  api_key: "" # 对应环境变量 BACKTEST_BIRDEYE_API_KEY
  api_keys: [] # 对应环境变量 BACKTEST_BIRDEYE_API_KEYS，可传逗号分隔；429/额度耗尽时自动轮换
  chain: "solana"
  trade_max_pages: 1

gmgn:
  base_url: "https://openapi.gmgn.ai"
  api_key: "" # 对应环境变量 BACKTEST_GMGN_API_KEY；GMGN K 线与价格源必填
  api_keys: [] # 对应环境变量 BACKTEST_GMGN_API_KEYS，可传逗号分隔；请求按池中 key 轮询
  chain: "sol"
  max_qps: 8 # 实测 token_kline 约 10 QPS，线上默认留 20% 余量

bitquery:
  base_url: "https://streaming.bitquery.io/graphql"
  api_key: "" # 对应环境变量 BACKTEST_BITQUERY_API_KEY

redis:
  enabled: false
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  channel: "solana:meme:signals:pressure_breakout"
  consumer_channel: "" # 为空时交易消费沿用 channel

signal:
  candidate_monitor_enabled: false
  candidate_channel: "solana_scalper:candidate_pool"
  poll_interval_seconds: 2
  interval: "1m"
  min_market_cap: 0 # GMGN 返回价格不是市值，默认不按市值阈值移除；切到 Birdeye 市值源时可设 15000
  lookback_bars: 120
  redis_key_prefix: "solana_meme_v2:signal_monitor"

trade:
  enabled: false
  signal_consumer: false
  price_sync_enabled: false
  price_sync_interval: 15
  account_name: "default"
  wallet_address: ""
  wallet_private_key: ""
  buy_amount_usd: 10
  slippage_bps: 500
  priority_fee: 0
  solana_rpc_url: "https://api.mainnet-beta.solana.com"
  price_source: "gmgn" # gmgn / dexscreener；持仓估值默认使用 GMGN 最新 1m K 线 close
  dexscreener:
    base_url: "https://api.dexscreener.com"
  jupiter:
    base_url: "https://lite-api.jup.ag"
    api_key: ""

server:
  port: 8890
  mode: debug

database:
  dsn: "postgres://postgres:postgres@127.0.0.1:5432/solana_scalper_v2?sslmode=disable"
  auto_migrate: true

datasource:
  kline_query: ""
  token_search_query: ""

birdeye:
  base_url: "https://public-api.birdeye.so"
  api_key: "" # 对应环境变量 BACKTEST_BIRDEYE_API_KEY
  api_keys: [] # 对应环境变量 BACKTEST_BIRDEYE_API_KEYS，可传逗号分隔；429/额度耗尽时自动轮换
  chain: "solana"
  trade_max_pages: 1

bitquery:
  base_url: "https://streaming.bitquery.io/graphql"
  api_key: "" # 对应环境变量 BACKTEST_BITQUERY_API_KEY

redis:
  enabled: false
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  channel: "solana:meme:signals:pressure_breakout"
  consumer_channel: "" # 为空时交易消费沿用 channel；订阅候选池可配置为 solana_scalper:candidate_pool

trade:
  enabled: false
  signal_consumer: false
  price_sync_enabled: false
  price_sync_interval: 15
  account_name: "default"
  wallet_address: ""
  wallet_private_key: ""
  buy_amount_usd: 10
  slippage_bps: 500
  priority_fee: 0
  solana_rpc_url: "https://api.mainnet-beta.solana.com"
  dexscreener:
    base_url: "https://api.dexscreener.com"
  jupiter:
    base_url: "https://lite-api.jup.ag"
    api_key: ""
